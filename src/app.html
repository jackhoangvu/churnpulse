<!doctype html>
<html class="app-html" lang="en">
  <head class="app-head">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChurnPulse" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet';"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap"
      />
    </noscript>
    <script defer src="https://unpkg.com/three@0.170.0/build/three.min.js"></script>
    %sveltekit.head%
  </head>
  <body class="app-body" data-sveltekit-preload-data="hover">
    <div class="app-root">%sveltekit.body%</div>
  </body>
</html>
